<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Adeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #050008; /* Глубокий черный фон */
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      /* Убираем полосы прокрутки */
      scrollbar-width: none; 
    }

    /* --- Стартовый экран --- */
    #overlay {
      position: fixed; inset: 0; background: rgba(5, 0, 8, 0.95); z-index: 100;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: opacity 1.5s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .start-btn {
      padding: 20px 40px; font-size: 1.2rem; color: #ff477e;
      border: 1px solid #ff477e; border-radius: 30px; background: transparent;
      letter-spacing: 2px; transition: all 0.5s ease;
    }
    .start-btn:hover {
      background: #ff477e; color: #000;
      box-shadow: 0 0 30px rgba(255, 71, 126, 0.5);
    }

    /* --- Звёзды --- */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--dur) infinite alternate ease-in-out;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 0.8; transform: scale(1.2); }
    }

    /* --- Сцена --- */
    #scene {
      position: fixed; inset: 0; 
      perspective: 800px; /* Настроено для эффекта глубины */
      overflow: hidden;
    }

    /* Туннель */
    #tunnel {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
    }

    /* Слой сердца */
    .heart-layer {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      /* Анимация длительная и плавная */
      animation: flowTunnel 12s linear infinite; 
      will-change: transform, opacity;
    }

    /* 
       Эффект полета:
       1. Начинается БЛИЗКО к камере (translateZ 200px), но прозрачно
       2. Пролетает "мимо носа"
       3. Уходит в темноту и исчезает заранее
    */
    @keyframes flowTunnel {
      0% {
        transform: translate(-50%, -50%) translateZ(200px) scale(1.4);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      75% {
        opacity: 1;
        transform: translate(-50%, -50%) translateZ(-600px) scale(0.3);
      }
      100% {
        transform: translate(-50%, -50%) translateZ(-1000px) scale(0.05);
        opacity: 0;
      }
    }

    /* Слова */
    .word {
      position: absolute;
      font-weight: 800; text-transform: lowercase;
      /* Градиент для переливов */
      background: linear-gradient(90deg, #ff006e, #ff4d6d, #ff85a1, #ff006e);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      /* Легкая тень вместо тяжелого фильтра */
      text-shadow: 0 0 10px rgba(255, 0, 110, 0.4);
      animation: textShimmer 3s ease infinite alternate;
    }

    @keyframes textShimmer {
      0% { background-position: 0% 50%; text-shadow: 0 0 8px rgba(255, 0, 110, 0.3); }
      100% { background-position: 100% 50%; text-shadow: 0 0 15px rgba(255, 77, 109, 0.6); }
    }

    /* Имя Adeline */
    .center-name {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 700; letter-spacing: 5px;
      color: #fff; z-index: 10;
      text-shadow: 0 0 20px #ff006e, 0 0 40px rgba(255, 0, 110, 0.5);
      animation: namePulse 4s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes namePulse {
      0% { transform: translate(-50%, -50%) scale(1); text-shadow: 0 0 15px #ff006e; }
      100% { transform: translate(-50%, -50%) scale(1.02); text-shadow: 0 0 30px #ff4d6d; }
    }
  </style>
</head>
<body>

  <div id="overlay">
    <button class="start-btn">Начать </button>
  </div>

  <audio id="bg-music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="stars"></div>

  <div id="scene">
    <div id="tunnel"></div>
    <div class="center-name">Adeline</div>
  </div>

  <script>
    const tunnel = document.getElementById('tunnel');
    const starsContainer = document.getElementById('stars');
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('bg-music');
    
    const words = ['i', 'love', 'you'];
    
    // ОПТИМИЗАЦИЯ:
    // 12 сердец * 28 слов = 336 элементов на экране. 
    // Это очень мало для современных браузеров, лагов быть не должно.
    const layerCount = 12; 
    const pointCount = 28; 
    const animDuration = 12; // Секунд (медленно)

    // --- Создание звёзд ---
    function createStars() {
      starsContainer.innerHTML = '';
      const starCount = 80; // Количество звёзд (оптимизировано)
      const frag = document.createDocumentFragment();
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2 + 1;
        star.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          --dur: ${Math.random() * 3 + 2}s;
          animation-delay: ${Math.random() * 4}s;
        `;
        frag.appendChild(star);
      }
      starsContainer.appendChild(frag);
    }

    function buildTunnel() {
      tunnel.innerHTML = '';
      // Базовый размер сердца
      const baseScale = Math.min(window.innerWidth, window.innerHeight) / 35;
      
      // Шаг задержки, чтобы сердца шли равномерно
      const delayStep = animDuration / layerCount;
      const frag = document.createDocumentFragment();

      for (let l = 0; l < layerCount; l++) {
        const layer = document.createElement('div');
        layer.className = 'heart-layer';
        // Задержка сдвигает каждое следующее сердце
        layer.style.animationDelay = `-${l * delayStep}s`;

        for (let i = 0; i < pointCount; i++) {
          const t = (i / pointCount) * 2 * Math.PI;
          
          // Формула сердца
          const x = 16 * Math.pow(Math.sin(t), 3) * baseScale;
          const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * baseScale;

          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = words[i % 3];
          span.style.left = `${x}px`;
          span.style.top = `${y}px`;
          
          // Немного варьируем размер шрифта для живости
          span.style.fontSize = `${18 + Math.random() * 6}px`;
          
          layer.appendChild(span);
        }
        frag.appendChild(layer);
      }
      tunnel.appendChild(frag);
    }

    // Запуск
    overlay.addEventListener('click', () => {
      overlay.classList.add('hidden');
      audio.volume = 0.5;
      audio.play().catch(e => console.log("Музыка не запустилась, проверь файл music.mp3"));
    });

    createStars();
    buildTunnel();

    // Перестроение при повороте экрана
    let timer;
    window.addEventListener('resize', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        createStars();
        buildTunnel();
      }, 300);
    });
  </script>
</body>
</html>
